<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRADE PRO | Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0b0e11; color: white; font-family: 'Inter', sans-serif; }
        .binance-yellow { color: #f3ba2f; }
        .hidden { display: none; }
        .lang-dropdown { background: #2b3139; border: 1px solid #474d57; border-radius: 8px; }
    </style>
</head>
<body>

    <div id="authModal" class="fixed inset-0 bg-[#0b0e11] flex items-center justify-center z-50 p-4">
        <div class="bg-[#1e2329] p-8 rounded-3xl w-full max-w-md relative border border-gray-800">
            <div class="absolute top-4 right-4 flex items-center gap-4">
                <i class="fas fa-headset text-gray-400 cursor-pointer hover:text-white" onclick="alert('Destek Hattı: @AdminUsername')"></i>
                <i class="fas fa-globe text-gray-400 cursor-pointer hover:text-white" onclick="toggleMenu('langMenuAuth')"></i>
                <div id="langMenuAuth" class="hidden absolute top-8 right-0 lang-dropdown z-50 w-32">
                    <button onclick="changeLanguage('az')" class="w-full text-left px-4 py-2 hover:bg-[#363d48] text-xs border-b border-gray-700">AZ 🇦🇿</button>
                    <button onclick="changeLanguage('tr')" class="w-full text-left px-4 py-2 hover:bg-[#363d48] text-xs">TR 🇹🇷</button>
                </div>
            </div>

            <div class="text-center mb-8">
                <h1 class="text-3xl font-black italic binance-yellow">TRADE PRO</h1>
            </div>

            <div id="loginForm" class="space-y-4">
                <input id="user-input" type="text" placeholder="Kullanıcı Adı" class="w-full bg-[#2b3139] rounded-xl p-4 text-white focus:outline-none border border-gray-700">
                <input type="password" placeholder="Şifre" class="w-full bg-[#2b3139] rounded-xl p-4 text-white focus:outline-none border border-gray-700">
                <button id="login-btn" onclick="login()" class="w-full bg-[#f3ba2f] text-black font-bold py-4 rounded-xl uppercase">GİRİŞ YAP</button>
                <p id="no-acc-text" class="text-center text-sm text-gray-400">Hesabınız yok mu? <span class="binance-yellow cursor-pointer underline" onclick="toggleAuth()">Hemen Kaydol</span></p>
            </div>

            <div id="registerForm" class="hidden space-y-4">
                <input type="text" placeholder="E-posta" class="w-full bg-[#2b3139] rounded-xl p-4 text-white border border-gray-700">
                <input type="password" placeholder="Şifre" class="w-full bg-[#2b3139] rounded-xl p-4 text-white border border-gray-700">
                <button id="reg-btn" onclick="login()" class="w-full bg-[#f3ba2f] text-black font-bold py-4 rounded-xl uppercase">KAYIT OL</button>
                <p id="has-acc-text" class="text-center text-sm text-gray-400">Zaten üye misiniz? <span class="binance-yellow cursor-pointer underline" onclick="toggleAuth()">Giriş Yap</span></p>
            </div>
        </div>
    </div>

    <div id="mainContent" class="p-4 hidden">
        <header class="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
            <h1 class="binance-yellow text-xl font-black italic">TRADE PRO</h1>
            <div class="flex items-center gap-4">
                <i class="fas fa-headset text-gray-400 cursor-pointer hover:text-white" onclick="alert('Destek Hattı: @AdminUsername')"></i>
                <div class="relative">
                    <i class="fas fa-globe text-gray-400 cursor-pointer hover:text-white" onclick="toggleMenu('langMenuMain')"></i>
                    <div id="langMenuMain" class="hidden absolute top-8 right-0 lang-dropdown z-50 w-32">
                        <button onclick="changeLanguage('az')" class="w-full text-left px-4 py-2 hover:bg-[#363d48] text-xs border-b border-gray-700">AZ 🇦🇿</button>
                        <button onclick="changeLanguage('tr')" class="w-full text-left px-4 py-2 hover:bg-[#363d48] text-xs">TR 🇹🇷</button>
                    </div>
                </div>
            </div>
        </header>

        <div class="flex space-x-6 mb-6 border-b border-gray-800 pb-2 text-sm uppercase font-bold">
            <button onclick="showTab('exchange')" id="tab-ex" class="text-white border-b-2 border-yellow-500 pb-1">Mübadilə</button>
            <button onclick="showTab('wallet')" id="tab-wa" class="text-gray-400">Pul Kisəsi</button>
        </div>

        <div id="exchange-tab" class="space-y-4">
            <div class="bg-[#1e2329] p-4 rounded-xl border border-gray-800 space-y-5">
                <div class="flex justify-between items-center" onclick="openTrade('BTC')">
                    <div class="flex items-center gap-3">
                        <div class="bg-yellow-500 w-8 h-8 rounded-full flex items-center justify-center text-black font-bold text-[10px]">₿</div>
                        <div><p class="font-bold">BTC</p><p class="text-gray-500 text-[10px]">Bitcoin</p></div>
                    </div>
                    <div class="text-right"><p>71,111.55</p><p class="text-red-500 text-[10px]">-2.62%</p></div>
                </div>
                <div class="flex justify-between items-center" onclick="openTrade('XAUUSD')">
                    <div class="flex items-center gap-3">
                        <div class="bg-yellow-600 w-8 h-8 rounded-full flex items-center justify-center text-white font-bold text-[10px]">AU</div>
                        <div><p class="font-bold">XAU</p><p class="text-gray-500 text-[10px]">Qızıl</p></div>
                    </div>
                    <div class="text-right"><p>2,345.10</p><p class="text-green-500 text-[10px]">+0.45%</p></div>
                </div>
            </div>
        </div>

        <div id="trade-window" class="hidden space-y-4">
            <div id="tradingview_btc" class="rounded-xl overflow-hidden" style="height: 350px;"></div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="requestDeposit()" class="bg-[#2ebd85] py-4 rounded-xl font-bold uppercase">AL</button>
                <button onclick="requestDeposit()" class="bg-[#f6465d] py-4 rounded-xl font-bold uppercase">SAT</button>
            </div>
        </div>

        <div id="wallet-tab" class="hidden bg-[#1e2329] p-8 rounded-xl border border-gray-800 text-center">
            <p class="text-gray-400 mb-6">Bakiyeniz: 0.00 USDT</p>
            <button onclick="requestDeposit()" class="w-full bg-[#2ebd85] py-4 rounded-xl font-bold mb-3 uppercase">YATIRIM YAP</button>
            <button onclick="alert('Minimum 100 USDT')" class="w-full bg-gray-700 py-4 rounded-xl font-bold uppercase">PARA ÇEK</button>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="script.js"></script>
</body>
</html>
