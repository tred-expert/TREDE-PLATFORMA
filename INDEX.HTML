<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Global Trade Platform</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: sans-serif; }
        .chart-container { height: 400px; }
    </style>
</head>
<body>
    <div class="max-w-6xl mx-auto p-4">
        <div class="flex justify-between items-center border-b border-gray-800 pb-4 mb-6">
            <h1 class="text-2xl font-bold text-yellow-500">TRADE PRO</h1>
            <button id="connectBtn" class="bg-yellow-500 text-black px-6 py-2 rounded-lg font-bold hover:bg-yellow-600">Connect Wallet</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="md:col-span-2 bg-gray-900 p-4 rounded-xl border border-gray-800">
                <h2 class="text-lg mb-4">BTC/USDT Real-Time Chart</h2>
                <div class="chart-container" id="tradingview_widget"></div>
            </div>

            <div class="bg-gray-900 p-6 rounded-xl border border-gray-800">
                <h3 class="text-xl font-semibold mb-4 text-center">Şəxsi Kabinet</h3>
                <div class="bg-black p-4 rounded-lg mb-6">
                    <p class="text-gray-400 text-sm">Ümumi Balans (USDT)</p>
                    <p id="balance" class="text-3xl font-bold text-green-400">0.00</p>
                </div>
                
                <div class="space-y-4">
                    <button class="w-full bg-green-600 py-3 rounded-lg font-bold hover:bg-green-700">QIZIL AL</button>
                    <button class="w-full bg-red-600 py-3 rounded-lg font-bold hover:bg-red-700">SAT</button>
                </div>
                
                <div class="mt-8 text-xs text-gray-500 text-center">
                    Bütün əməliyyatlar şifrələnmiş şəkildə qorunur.
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
        new TradingView.widget({
            "autosize": true,
            "symbol": "BINANCE:BTCUSDT",
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "container_id": "tradingview_widget"
        });
    </script>
</body>
</html>
